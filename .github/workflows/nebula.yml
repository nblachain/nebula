name: nebula-ci

on:
  push:
  pull_request:

jobs:
  public-testnet:
    name: Nebula public testnet checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nebula-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: nebula-cargo-${{ runner.os }}-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build Nebula testnet binary
        run: cargo build --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet

      - name: Smoke launch-bound lifecycle and follower evidence
        run: >
          cargo test --manifest-path crates/nebula-testnet/Cargo.toml
          --test public_admin_rpc_separation
          launch_bound_follower_exports_verifiable_runtime_surface_evidence
          -- --exact --nocapture

      - name: Smoke public/admin RPC split
        run: >
          cargo test --manifest-path crates/nebula-testnet/Cargo.toml
          --test public_admin_rpc_separation
          public_rpc_rejects_admin_methods_even_with_valid_token
          -- --exact --nocapture

      - name: Test EVM execution crate
        run: cargo test -p nebula-evm

      - name: Smoke EVM runtime integration (fees, atomicity, snapshot round-trip)
        run: >
          cargo test -p nebula-testnet --lib evm_ -- --nocapture

      - name: Smoke hybrid fee-preference routing and anti-replay
        run: >
          cargo test -p nebula-testnet --lib fee_preference -- --nocapture

      - name: Smoke validator fee-preference back-and-forth switching
        run: >
          cargo test -p nebula-testnet --lib
          runtime::tests::validator_can_switch_fee_preference_back_and_forth_and_snapshot_stays_valid
          -- --exact --nocapture

      - name: Smoke mainnet-readiness gate
        run: >
          cargo test -p nebula-testnet --lib
          runtime::tests::mainnet_readiness_reports_code_gates_and_external_gates
          -- --exact --nocapture

      - name: Run Nebula test suite
        run: cargo test --workspace -- --test-threads=1

      - name: Check public launch readiness contract
        shell: bash
        run: |
          set -euo pipefail
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --mainnet-readiness --json)"
          NEBULA_READINESS_JSON="$output" python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["NEBULA_READINESS_JSON"])
          acceptance = payload["acceptance"]
          readiness = payload["public_launch_readiness"]
          economics = payload["economics"]
          roots = payload["status_roots"]
          assert acceptance["testnet_ready"] is True
          assert readiness["public_launch_ready"] is False
          assert readiness["level"] == "public-launch-blocked"
          assert readiness["blocking_gaps"] == ["public-launch-deployment-attestation"]
          assert readiness["remediation_root"]
          assert economics["native_fee_token"] == "NBLA"
          assert economics["bridged_fee_token"] == "nXMR"
          assert economics["native_base_unit"] == "nebulai"
          assert economics["nebulai_per_nbla"] == 1000000
          assert economics["target_nxmr_per_nbla_numerator"] == 1
          assert economics["target_nxmr_per_nbla_denominator"] == 1000
          assert economics["target_nxmr_base_units_per_nxmr"] == 1000000000
          assert economics["target_nxmr_to_nbla_rate_nebulai_per_unit"] == 1
          assert economics["nxmr_reserve_backing_bps"] == 0
          assert economics["nxmr_validator_reward_bps"] == 10000
          assert roots["validator_admission"]
          assert roots["genesis_manifest"]
          assert roots["launch_package"]
          assert roots["launch_package_bundle"]
          assert roots["validator_activation"]
          assert roots["validator_join"]
          assert roots["operator_join_confirmation"]
          assert roots["public_observer_confirmation"]
          assert roots["public_testnet_launch_certificate"]
          assert roots["public_status_surface"]
          assert roots["public_probe_surface"]
          assert roots["preflight_receipt"]
          assert roots["runbook_receipt"]
          PY

      - name: Verify public status and probe surface
        shell: bash
        run: |
          set -euo pipefail
          status="$(mktemp)"
          probe="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-status > "$status"
          status_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-status "$status" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-probe > "$probe"
          probe_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-probe "$probe" --json)"
          NEBULA_PUBLIC_STATUS_JSON="$status_output" NEBULA_PUBLIC_PROBE_JSON="$probe_output" python3 - <<'PY'
          import json
          import os

          status = json.loads(os.environ["NEBULA_PUBLIC_STATUS_JSON"])
          probe = json.loads(os.environ["NEBULA_PUBLIC_PROBE_JSON"])
          assert status["public_status_ready"] is True
          assert status["level"] == "public-status-attested"
          assert len(status["public_status_manifest_root"]) == 64
          assert status["endpoint_url"] == "https://testnet.nebula.example/status"
          assert len(status["launch_bundle_root"]) == 64
          assert probe["public_probe_ready"] is True
          assert probe["level"] == "public-probe-attested"
          assert len(probe["public_probe_root"]) == 64
          assert probe["endpoint_url"] == status["endpoint_url"]
          assert probe["launch_bundle_root"] == status["launch_bundle_root"]
          assert len(probe["fee_policy_root"]) == 64
          PY

      - name: Verify preflight and runbook receipts
        shell: bash
        run: |
          set -euo pipefail
          preflight="$(mktemp)"
          runbook="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-preflight-receipt > "$preflight"
          preflight_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-preflight-receipt "$preflight" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-runbook-receipt > "$runbook"
          runbook_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-runbook-receipt "$runbook" --json)"
          NEBULA_PREFLIGHT_JSON="$preflight_output" NEBULA_RUNBOOK_JSON="$runbook_output" python3 - <<'PY'
          import json
          import os

          preflight = json.loads(os.environ["NEBULA_PREFLIGHT_JSON"])
          runbook = json.loads(os.environ["NEBULA_RUNBOOK_JSON"])
          assert preflight["receipt_ready"] is True
          assert preflight["level"] == "receipt-attested"
          assert preflight["receipt_id"] == "preflight-receipt"
          assert len(preflight["receipt_root"]) == 64
          assert preflight["phase_count"] >= 1
          assert preflight["step_count"] >= 1
          assert runbook["receipt_ready"] is True
          assert runbook["level"] == "receipt-attested"
          assert runbook["receipt_id"] == "runbook-receipt"
          assert len(runbook["receipt_root"]) == 64
          assert runbook["phase_count"] >= 1
          assert runbook["step_count"] >= 1
          PY

      - name: Verify deployment attestation gate
        shell: bash
        run: |
          set -euo pipefail
          sample="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-deployment-attestation > "$sample"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-deployment-attestation "$sample" --json)"
          NEBULA_ATTESTATION_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_ATTESTATION_JSON"])
          assert payload["public_launch_ready"] is True
          assert payload["level"] == "public-launch-attested"
          assert len(payload["evidence_root"]) == 64
          assert len(payload["witness_evidence_root"]) == 64
          assert payload["verified_operator_count"] >= 2
          assert payload["verified_observer_count"] >= 2
          assert payload["verified_region_count"] >= 2
          PY

      - name: Verify validator set gate
        shell: bash
        run: |
          set -euo pipefail
          sample="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-validator-set > "$sample"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-validator-set "$sample" --json)"
          NEBULA_VALIDATOR_SET_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_VALIDATOR_SET_JSON"])
          assert payload["validator_set_ready"] is True
          assert payload["level"] == "validator-set-attested"
          assert len(payload["validator_set_root"]) == 64
          assert payload["validator_count"] >= 2
          assert payload["operator_count"] >= 2
          assert payload["region_count"] >= 2
          assert payload["total_genesis_power"] > 0
          assert payload["reward_unit"] == "nebulai"
          PY

      - name: Verify genesis manifest gate
        shell: bash
        run: |
          set -euo pipefail
          attestation="$(mktemp)"
          validators="$(mktemp)"
          genesis="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-deployment-attestation > "$attestation"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-validator-set > "$validators"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-genesis-manifest --deployment-attestation "$attestation" --validator-set "$validators" > "$genesis"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-genesis-manifest "$genesis" --json)"
          NEBULA_GENESIS_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_GENESIS_JSON"])
          assert payload["genesis_ready"] is True
          assert payload["level"] == "genesis-manifest-attested"
          assert len(payload["genesis_root"]) == 64
          assert len(payload["deployment_attestation_root"]) == 64
          assert len(payload["validator_set_root"]) == 64
          assert payload["initial_validator_count"] >= 2
          assert payload["initial_total_power"] > 0
          assert payload["activation_height"] > 0
          PY

      - name: Prove local public testnet launch chain
        shell: bash
        run: |
          set -euo pipefail
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --prove-local-public-testnet --json)"
          NEBULA_REHEARSAL_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_REHEARSAL_JSON"])
          assert payload["local_public_testnet_rehearsed"] is True
          assert payload["level"] == "local-public-testnet-rehearsal-ready"
          # Public launch stays blocked until real deployment evidence exists.
          assert payload["public_launch_ready"] is False
          assert payload["verified_artifact_count"] >= 1
          assert len(payload["public_testnet_launch_certificate_root"]) == 64
          assert len(payload["public_testnet_peer_manifest_root"]) == 64
          assert len(payload["launch_package_bundle_root"]) == 64
          assert len(payload["rehearsal_root"]) == 64
          assert payload["validator_count"] >= 2
          assert payload["operator_count"] >= 2
          assert payload["observer_count"] >= 2
          assert payload["region_count"] >= 2
          PY

      - name: Prove live RPC devnet runtime surface
        shell: bash
        run: |
          set -euo pipefail
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --prove-live-rpc-devnet --json)"
          NEBULA_DEVNET_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_DEVNET_JSON"])
          assert payload["live_rpc_devnet_rehearsed"] is True
          assert payload["level"] == "live-rpc-devnet-rehearsal-ready"
          assert payload["sub_second_blocks"] is True
          assert payload["runtime_surface_ready"] is True
          assert payload["sync_quorum_met"] is True
          assert payload["bridge_custody_reconciled"] is True
          assert payload["produced_block_count"] >= 1
          assert len(payload["runtime_surface_root"]) == 64
          assert len(payload["public_testnet_peer_manifest_root"]) == 64
          PY

      - name: Verify Nebula guide mirror
        run: cmp docs/NEBULA_LAYER2.md README.md

  docker-image:
    name: Nebula Docker packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config -q

      - name: Build node image
        run: docker build -t nebula-node:ci .

      - name: Smoke test node container health surface
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name nebula-ci -p 9944:9944 nebula-node:ci
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9944/health >/dev/null; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:9944/health | python3 -c "import json,sys; payload = json.load(sys.stdin); assert payload['ok'] is True; assert payload['latest_height'] >= 0"
          curl -sf http://127.0.0.1:9944/metrics | grep -q nebula
          docker stop nebula-ci
